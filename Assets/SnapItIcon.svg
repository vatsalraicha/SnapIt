<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Back page (offset to top-right) -->
  <rect x="90" y="40" width="380" height="400" rx="4" ry="4"
        fill="white" stroke="#3A3A3A" stroke-width="8"/>

  <!-- Front page (offset to bottom-left) -->
  <rect x="42" y="100" width="380" height="400" rx="4" ry="4"
        fill="white" stroke="#3A3A3A" stroke-width="8"/>

  <!-- "A" letter -->
  <text x="120" y="355" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="190" font-weight="500" fill="#555555">A</text>

  <!-- "a" letter -->
  <text x="275" y="355" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="140" font-weight="400" fill="#777777">a</text>

  <!-- Underline below Aa -->
  <line x1="105" y1="370" x2="370" y2="370"
        stroke="#AAAAAA" stroke-width="8" stroke-linecap="round"/>

  <!-- Plus sign (top-right corner) -->
  <line x1="470" y1="10" x2="470" y2="70"
        stroke="#555555" stroke-width="18" stroke-linecap="round"/>
  <line x1="435" y1="40" x2="500" y2="40"
        stroke="#555555" stroke-width="18" stroke-linecap="round"/>
</svg>
